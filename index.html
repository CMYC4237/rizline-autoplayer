<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rizline Autoplay</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f2f5;color:#1e293b;font-family:'Segoe UI','PingFang SC',system-ui,sans-serif;display:flex;height:100vh;overflow:hidden}
#left{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:0;padding:12px;gap:8px}
canvas{display:block;border-radius:6px;box-shadow:0 2px 12px rgba(0,0,0,.1);background:#fff}
#toolbar{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;flex-direction:column;gap:0;width:100%;max-width:540px;padding:10px 12px}
.tb-row{display:flex;align-items:center;gap:6px;font-size:12px;padding:2px 0}
.tb-row input[type=range]{flex:1;accent-color:#6366f1;height:18px}
#toolbar button{background:#fff;color:#475569;border:1px solid #e2e8f0;border-radius:5px;padding:5px 10px;cursor:pointer;font-size:12px;white-space:nowrap;transition:all .15s;font-weight:500}
#toolbar button:hover{background:#6366f1;color:#fff;border-color:#6366f1}
#toolbar button:disabled{opacity:.35;cursor:default;background:#fff;color:#94a3b8}
#toolbar .time{min-width:90px;text-align:right;color:#6366f1;font-weight:600;font-variant-numeric:tabular-nums;font-size:12px}
#toolbar .right{flex:1;text-align:right}
.state{color:#94a3b8;font-size:11px;white-space:nowrap}
#panel{flex-shrink:0;overflow-y:auto;padding:16px 18px;font-size:12px;width:320px;background:#fff;border-left:1px solid #e2e8f0;box-shadow:-2px 0 8px rgba(0,0,0,.03)}
#panel h2{font-size:14px;color:#1e293b;margin:14px 0 8px;font-weight:600}#panel h2:first-child{margin-top:0}
.row{display:flex;align-items:center;gap:8px;margin:4px 0;padding:2px 0}
.row label{min-width:72px;color:#475569;font-weight:500}
.row input[type=range]{flex:1;accent-color:#6366f1;min-width:40px}
.row input[type=checkbox]{accent-color:#6366f1}
.row .v{min-width:38px;text-align:right;color:#6366f1;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
#info{position:fixed;top:12px;left:12px;font-size:11px;color:#475569;background:rgba(255,255,255,.9);padding:5px 10px;border-radius:4px;pointer-events:none;z-index:5;box-shadow:0 1px 3px rgba(0,0,0,.06)}
#overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(240,242,245,.92);z-index:99;flex-direction:column;gap:14px}
#overlay.hidden{display:none}
#overlay .msg{color:#475569;font-size:16px;text-align:center;max-width:440px;padding:0 16px;line-height:1.5}
#overlay .err{color:#ef4444}
</style>
</head>
<body>
<div id="left">
  <canvas id="cv" width="540" height="960"></canvas>
  <div id="toolbar">
    <div class="tb-row">
      <input type="range" id="seek" min="0" max="1000" value="0" step="1" disabled>
      <span class="time" id="time">0.0 / 0.0s</span>
    </div>
    <div class="tb-row">
      <button id="b_begin" disabled>⏮</button>
      <button id="b_play" disabled>▶</button>
      <button id="b_pause" disabled>⏸</button>
      <span class="right">
        <button id="b_import">导入谱面</button>
        <input type="file" id="f_json" accept=".json" style="display:none">
        <button id="b_audio">导入音乐(BGM)</button>
        <input type="file" id="f_audio" accept="audio/*" style="display:none">
      </span>
    </div>
    <div class="tb-row"><span class="right state" id="status">未加载谱面</span></div>
  </div>
</div>
<div id="panel">
  <h2>控制</h2>
  <div class="row"><label>播放速度</label><input type="range" id="rate" min="0.1" max="3" step="0.1" value="1"><span class="v" id="ratev">1.0</span></div>
  <div class="row"><label>流速</label><input type="range" id="flow" min="0.1" max="10" step="0.1" value="1"><span class="v" id="flowv">1.0</span></div>
  <div class="row"><label>SFX音量</label><input type="range" id="sfxvol" min="0" max="1" step="0.05" value="0.6"><span class="v" id="sfxvolv">0.60</span></div>
  <div class="row"><label>BGM音量</label><input type="range" id="bgmvol" min="0" max="1" step="0.05" value="0.6"><span class="v" id="bgmvolv">0.60</span></div>
  <div class="row"><label>线宽</label><input type="range" id="linew" min="0.5" max="10" step="0.1" value="4"><span class="v" id="linewv">4.0</span></div>
  <div class="row"><label>滚轮步长</label><input type="range" id="wstep" min="0.05" max="5" step="0.05" value="0.25"><span class="v" id="wstepv">0.25</span></div>
  <div class="row"><label>判定线偏移</label><input type="range" id="joff" min="-100" max="100" step="1" value="0"><span class="v" id="joffv">0</span></div>
  <div class="row"><label>尺寸缩放</label><input type="range" id="sscale" min="0.01" max="0.08" step="0.001" value="0.047"><span class="v" id="sscalev">0.047</span></div>
  <div class="row"><label>启用遮罩</label><input type="checkbox" id="mask" checked></div>
  <div style="margin-top:14px;color:#94a3b8;font-size:11px;line-height:1.7;border-top:1px solid #e2e8f0;padding-top:10px">空格=播放/暂停 | ←/→=快退/快进<br>滚轮=微调进度 | 拖动=跳转</div>
  <h2>帧耗时</h2>
  <canvas id="perf" width="310" height="120" style="width:100%;border-radius:4px"></canvas>
</div>
<div id="info"></div>
<div id="overlay" class="hidden"><div class="msg" id="ovmsg"></div></div>

<script src="js/easing.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/chart.js"></script>
<script src="js/audio.js"></script>
<script src="js/render.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
